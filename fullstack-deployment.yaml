# ─────────────────────────────────────────────────────────────────────────────
# fullstack-deployment.yaml
# One Pod — frontend (nginx) + backend (express) + mongodb (sidecar)
# ArgoCD / GitHub Actions patches the image tags automatically via sed.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Namespace
metadata:
  name: crud-app

---
# ── ConfigMap ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: crud-app
data:
  NODE_ENV: "production"
  PORT: "5000"
  # MongoDB runs as sidecar in same pod → use localhost
  MONGO_URI: "mongodb://localhost:27017/crudapp"
  NGINX_BACKEND_HOST: "localhost"
  NGINX_BACKEND_PORT: "5000"

---
# ── Secret (base64-encoded) ───────────────────────────────────────────────────
# echo -n 'crudapp_secret_key' | base64
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: crud-app
type: Opaque
data:
  JWT_SECRET: Y3J1ZGFwcF9zZWNyZXRfa2V5

---
# ── PersistentVolumeClaim for MongoDB data ────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: crud-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ── ConfigMap: nginx.conf injected into the frontend container ────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: crud-app
data:
  nginx.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Proxy API calls to Express backend (same pod → localhost:5000)
        location /api/ {
            proxy_pass         http://localhost:5000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # React SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fullstack-app
  namespace: crud-app
  labels:
    app: fullstack-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fullstack-app
  template:
    metadata:
      labels:
        app: fullstack-app
    spec:

      # ── Init container: wait for MongoDB to be ready ──────────────────────
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MongoDB...";
              until nc -z localhost 27017; do
                echo "MongoDB not ready, retrying in 2s...";
                sleep 2;
              done;
              echo "MongoDB is up!";

      containers:

        # ── 1. MongoDB sidecar ───────────────────────────────────────────────
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 10

        # ── 2. Express backend ───────────────────────────────────────────────
        - name: backend
          image: rituraj4164/backend:latest   # ← patched by CI/CD
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10

        # ── 3. React frontend (nginx) ────────────────────────────────────────
        - name: frontend
          image: rituraj4164/frontend:latest  # ← patched by CI/CD
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config-vol
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-pvc
        - name: nginx-config-vol
          configMap:
            name: nginx-config

---
# ── Service: NodePort — exposes port 80 externally ───────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: fullstack-svc
  namespace: crud-app
spec:
  type: NodePort
  selector:
    app: fullstack-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080   # Access via http://<NodeIP>:30080
